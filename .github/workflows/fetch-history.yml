name: Fetch Lotto History

on:
  workflow_dispatch:
    inputs:
      fromYear:
        description: 'From Year (e.g. 2022)'
        required: true
        default: '2022'
        type: string
      toYear:
        description: 'To Year (e.g. 2026)'
        required: true
        default: '2026'
        type: string

permissions:
  contents: write

jobs:
  fetch-history:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run history scraper
        run: node scripts/fetch-history.js ${{ github.event.inputs.fromYear }} ${{ github.event.inputs.toYear }}

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi
          git commit -m "📜 Update historical lotto results (${{ github.event.inputs.fromYear }}-${{ github.event.inputs.toYear }})"
          git pull --rebase --autostash origin ${{ github.ref_name }}
          git push
